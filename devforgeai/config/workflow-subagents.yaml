# Workflow Subagents Configuration
# STORY-151: Post-Subagent Recording Hook
#
# Purpose: Defines which subagents are part of the TDD workflow and should be
# recorded in the phase state file for enforcement and audit purposes.
#
# Status: Active
# Version: 1.0.0
# Last Updated: 2025-12-28

# Subagents that are part of the TDD development workflow
# These subagents will be recorded when invoked during /dev workflow
workflow_subagents:
  - tech-stack-detector
  - context-validator
  - test-automator
  - backend-architect
  - refactoring-specialist
  - integration-tester
  - code-reviewer
  - security-auditor
  - deferral-validator
  - dev-result-interpreter

# Subagents that are NOT part of the TDD workflow
# These subagents will be skipped (not recorded) when invoked
excluded_subagents:
  - internet-sleuth
  - documentation-writer
  - api-designer
  - stakeholder-analyst
