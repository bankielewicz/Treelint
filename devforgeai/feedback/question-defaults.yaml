# ============================================================================
# INTEGRATION NOTES
# How this configuration is used
# ============================================================================

integration:
  loader: "devforgeai_cli/feedback/adaptive_questioning_engine.py"
  method: "load_from_yaml"
  caching: "enabled"
  cache_ttl_minutes: 60

  # How defaults are applied
  selection_algorithm:
    - "Load question bank YAML file"
    - "If unavailable, use defaults from this file"
    - "If operation type unsupported, use fallback questions"
    - "Apply adaptive selection based on context"
    - "Filter by priority and availability"
    - "Return ranked question list"
