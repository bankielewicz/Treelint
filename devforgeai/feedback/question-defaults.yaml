# ============================================================================
# QUESTION CATEGORIES
# How questions are organized
# ============================================================================

categories:
  confidence:
    label: "Confidence & Comfort"
    description: "Assess user confidence with process"
    typical_questions: 10
    priority_range: [1, 3]

  investigation:
    label: "Investigation & Diagnostics"
    description: "Understand what went wrong"
    typical_questions: 12
    priority_range: [1, 2]

  optimization:
    label: "Optimization & Quality"
    description: "Gather feedback for improvements"
    typical_questions: 12
    priority_range: [2, 4]

  next-steps:
    label: "Next Steps & Planning"
    description: "Understand future direction"
    typical_questions: 10
    priority_range: [1, 3]

# ============================================================================
